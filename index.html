<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bitget Stock Perp | Liquidity Hunter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e11; color: #e1e3e6; font-family: ui-sans-serif, system-ui; overflow: hidden; }
        .panel { background: #1e2026; border: 1px solid #2b2f36; border-radius: 12px; }
        .buy-zone { border-left: 4px solid #00c087; background: linear-gradient(90deg, rgba(0,192,135,0.1) 0%, transparent); }
        .sell-zone { border-left: 4px solid #f84960; background: linear-gradient(90deg, rgba(248,73,96,0.1) 0%, transparent); }
    </style>
</head>
<body class="p-6 h-screen flex flex-col">

    <header class="flex justify-between items-center mb-6 panel p-4">
        <div class="flex items-center gap-3">
            <span class="text-blue-500 text-2xl">⚡</span>
            <h1 class="text-xl font-bold tracking-tight">BITGET <span class="text-blue-500">RADAR</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <select id="asset-select" onchange="changeTicker(this.value)" class="bg-gray-900 border border-gray-700 px-3 py-1 rounded text-sm outline-none">
                <option value="TSLAUSDT">TESLA (TSLA)</option>
                <option value="NVDAUSDT">NVIDIA (NVDA)</option>
                <option value="AAPLUSDT">APPLE (AAPL)</option>
                <option value="MSTRUSDT">MICROSTRATEGY (MSTR)</option>
            </select>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-xs font-bold transition">RECONNECT</button>
            <div id="status-tag" class="px-3 py-1 rounded-full text-[10px] font-bold bg-red-500/10 text-red-500 border border-red-500/20 uppercase">Disconnected</div>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-6 flex-1 overflow-hidden">
        <aside class="col-span-4 panel p-5 flex flex-col">
            <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Order Clusters (Hunts)</h2>
            <div id="clusters" class="space-y-3 overflow-y-auto flex-1 pr-2">
                <div class="text-xs text-gray-600 italic">Waiting for connection...</div>
            </div>
        </aside>

        <main class="col-span-8 flex flex-col gap-6">
            <div class="panel p-8 flex justify-between items-center bg-gradient-to-r from-blue-900/5 to-transparent">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Live Mark Price</p>
                    <h2 id="live-price" class="text-6xl font-black text-white">$---.--</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-500 uppercase mb-1">Funding (24h)</p>
                    <p id="funding-val" class="text-xl font-mono text-blue-400">0.0000%</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 flex-1">
                <div class="panel p-5 overflow-hidden">
                    <p class="text-[10px] text-red-400 font-bold uppercase mb-4">Sell Walls (Resistance)</p>
                    <div id="ask-book" class="space-y-1 h-64 flex flex-col-reverse justify-start"></div>
                </div>
                <div class="panel p-5 overflow-hidden">
                    <p class="text-[10px] text-green-400 font-bold uppercase mb-4">Buy Walls (Support)</p>
                    <div id="bid-book" class="space-y-1 h-64"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let socket;
        let symbol = 'TSLAUSDT';

        function start() {
            // Updated to the direct V5 endpoint for Futures
            socket = new WebSocket('wss://ws.bitget.com/v5/public/mix');

            socket.onopen = () => {
                const tag = document.getElementById('status-tag');
                tag.innerText = "● Live Stream";
                tag.className = "px-3 py-1 rounded-full text-[10px] font-bold bg-green-500/10 text-green-500 border border-green-500/20 uppercase";
                
                // Subscription for Mark Price and Depth
                const msg = {
                    op: "subscribe",
                    args: [
                        { instType: "USDT-FUTURES", channel: "ticker", instId: symbol },
                        { instType: "USDT-FUTURES", channel: "books", instId: symbol }
                    ]
                };
                socket.send(JSON.stringify(msg));
            };

            socket.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (!res.data) return;

                if (res.arg.channel === 'ticker') {
                    document.getElementById('live-price').innerText = '$' + parseFloat(res.data[0].lastPr).toFixed(2);
                    document.getElementById('funding-val').innerText = (parseFloat(res.data[0].fundingRate) * 100).toFixed(4) + '%';
                }

                if (res.arg.channel === 'books') {
                    updateDepth(res.data[0]);
                }
            };

            socket.onclose = () => { setTimeout(start, 2000); };
        }

        function changeTicker(val) {
            socket.close();
            symbol = val;
            start();
        }

        function updateDepth(data) {
            const bids = data.bids.slice(0, 15);
            const asks = data.asks.slice(0, 15);

            document.getElementById('bid-book').innerHTML = bids.map(b => `<div class="flex justify-between text-[11px] font-mono text-green-500"><span>$${parseFloat(b[0]).toFixed(2)}</span><span>${parseFloat(b[1]).toFixed(1)}</span></div>`).join('');
            document.getElementById('ask-book').innerHTML = asks.map(a => `<div class="flex justify-between text-[11px] font-mono text-red-500"><span>$${parseFloat(a[0]).toFixed(2)}</span><span>${parseFloat(a[1]).toFixed(1)}</span></div>`).join('');

            // Cluster Algorithm: Identify 5x larger than average orders
            const avg = [...bids, ...asks].reduce((a, b) => a + parseFloat(b[1]), 0) / 30;
            let clusters = [];

            bids.forEach(b => { if(parseFloat(b[1]) > avg * 4) clusters.push({p: b[0], s: b[1], t: 'BUY HUNT', c: 'buy-zone'}); });
            asks.forEach(a => { if(parseFloat(a[1]) > avg * 4) clusters.push({p: a[0], s: a[1], t: 'SELL HUNT', c: 'sell-zone'}); });

            document.getElementById('clusters').innerHTML = clusters.map(z => `
                <div class="p-4 rounded-lg panel ${z.c}">
                    <div class="flex justify-between text-[9px] font-bold text-gray-500 mb-1">
                        <span>${z.t} AREA</span>
                        <span class="text-blue-500">LIQUIDITY DEPTH</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-2xl font-black">$${parseFloat(z.p).toFixed(2)}</span>
                        <span class="text-xs">${parseFloat(z.s).toFixed(1)} Units</span>
                    </div>
                </div>
            `).join('') || '<div class="text-xs text-gray-700">Monitoring order flow...</div>';
        }

        start();
    </script>
</body>
</html>
